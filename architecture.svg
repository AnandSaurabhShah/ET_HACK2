    <path d="M655 143 L695 143"/>
    <path d="M825 164 L825 180"/>
    <path d="M825 222 L825 238"/>
    <path d="M825 280 L825 296"/>
    <path d="M695 259 L655 259"/>
    <path d="M695 317 L655 317"/>
    <path d="M825 338 L825 354"/>
